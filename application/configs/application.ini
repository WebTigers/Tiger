; App config — APP-OWNED, edit freely. Tiger's core bootstrap lives in
; vendor/webtigers/tiger-core/configs/core.ini and is never touched by updates.
; This file merges ON TOP of core.ini; secrets / per-deploy values go in
; local.ini (gitignored), which merges on top of this.
[production]
; Active look — swap the skin, or the whole theme. Skins ship in the PUMA theme:
;   puma (Zephyr) · jaguar (Flatly) · tabby (United) · cheetah. This is just the
;   default; devs can preview skins live via the in-app skin switcher (non-prod).
tiger.theme = "puma"
tiger.skin  = "puma"

; site.name = "My Tiger App"

; Per-env sections inherit [production]; override only what differs.
[staging : production]
; site.url = "https://staging.myapp.com"

[testing : production]

[development : production]
; tiger.skin = "cheetah"
